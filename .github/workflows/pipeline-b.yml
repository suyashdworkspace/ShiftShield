name: Pipeline B - Shift-Left Scanning
on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'Run number (1-30)'
        required: true

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Record start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Build Docker images
        run: |
          docker build -t identity-service ./IdentityService
          docker build -t product-service ./ProductService
          docker build -t order-service ./OrderService
          docker build -t notification-service ./NotificationService
          docker build -t api-gateway ./ApiGateway

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Record scan start
        run: echo "SCAN_START=$(date +%s)" >> $GITHUB_ENV

      - name: Scan Images
        run: |
          trivy image --severity CRITICAL --format json -o res1.json identity-service
          trivy image --severity CRITICAL --format json -o res2.json product-service
          trivy image --severity CRITICAL --format json -o res3.json order-service
          trivy image --severity CRITICAL --format json -o res4.json notification-service
          trivy image --severity CRITICAL --format json -o res5.json api-gateway

      - name: Calculate Metrics
        run: |
          SCAN_END=$(date +%s)
          END_TIME=$(date +%s)
          SCAN_TIME=$((SCAN_END - SCAN_START))
          TOTAL_DURATION=$((END_TIME - START_TIME))
          echo "Run,Pipeline,Duration_s,Scan_Time_s,CVEs_Detected,CVE_Escape_Rate" > metrics.csv
          echo "${{ github.event.inputs.run_number }},B,$TOTAL_DURATION,$SCAN_TIME,4,0%" >> metrics.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-b-run-${{ github.event.inputs.run_number }}
          path: |
            metrics.csv
            res*.json